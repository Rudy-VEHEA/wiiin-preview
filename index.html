<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="robots" content="noindex, nofollow" />
<meta name="theme-color" content="#0b1b2e" />
<title>Wiiin — preview</title>
<link rel="icon" type="image/svg+xml" href="WIIIN_icon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#f4f0e3;--ink:#0b1b2e;--ink-soft:#1f3a55;--mint:#68d79f;--mint-deep:#3a9e6e;--gold:#f7c948;--plum:#8a3ad2;--hot:#ff5b3a;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;font-family:"Inter Tight",-apple-system,BlinkMacSystemFont,sans-serif;color:var(--ink);background:var(--bg);}
  .mono{font-family:"JetBrains Mono",monospace;}
  header{position:sticky;top:0;z-index:5;background:var(--bg);border-bottom:1px solid rgba(11,27,46,.08);padding:13px 16px calc(env(safe-area-inset-top));display:flex;align-items:center;justify-content:space-between;}
  .brand{display:flex;align-items:center;gap:9px;}
  .brand .ball{width:36px;height:36px;border-radius:50%;background:var(--mint);display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .brand .ball img{width:32px;height:32px;}
  .brand b{font-size:20px;font-weight:900;letter-spacing:-0.03em;}
  main{max-width:560px;margin:0 auto;padding:18px 14px 50px;}
  .lead{margin:6px 0 18px;}
  .lead h1{font-size:clamp(26px,6vw,34px);font-weight:900;letter-spacing:-0.035em;margin:0 0 6px;}
  .lead p{color:var(--ink-soft);font-size:14px;margin:0;}
  .hl{background:var(--mint);color:var(--ink);padding:0 .12em;border-radius:.1em;}
  .pill{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:9px 16px;border-radius:999px;font-weight:800;font-size:13px;border:none;cursor:pointer;}
  .pill-mint{background:var(--mint);color:var(--ink);} .pill-ghost{background:transparent;color:var(--ink);border:1.5px solid rgba(11,27,46,.18);}
  .tabs{display:flex;gap:8px;margin-bottom:14px;}
  .tab{flex:1;text-align:center;padding:11px;border-radius:13px;background:#fff;color:var(--ink-soft);font-weight:700;border:1px solid rgba(11,27,46,.08);cursor:pointer;font-size:14px;}
  .tab.on{color:var(--ink);border-color:var(--mint);box-shadow:0 0 0 1.5px var(--mint) inset;}
  .mcard{background:#fff;border:1px solid rgba(11,27,46,.07);border-radius:18px;padding:14px 16px;margin-bottom:11px;}
  .row{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .badge{font-family:"JetBrains Mono",monospace;font-size:10px;font-weight:700;padding:3px 8px;border-radius:7px;color:#fff;letter-spacing:.04em;}
  .side{display:flex;align-items:center;justify-content:space-between;padding:11px 0;}
  .side+.side{border-top:1px solid rgba(11,27,46,.08);}
  .side .nm{font-weight:700;font-size:16px;} .side .pts{font-weight:900;color:var(--mint-deep);} .side .sc{font-weight:800;font-variant-numeric:tabular-nums;}
  .side.can{cursor:pointer;border-radius:10px;} .side.can:hover{background:var(--bg);} .side.pk{color:var(--mint-deep);}
  .muted{color:var(--ink-soft);font-size:13px;}
  .center{text-align:center;color:var(--ink-soft);padding:32px 12px;}
  .kpis{display:flex;gap:10px;margin-bottom:14px;}
  .kpi{flex:1;background:#fff;border:1px solid rgba(11,27,46,.07);border-radius:14px;padding:16px;text-align:center;}
  .kpi b{display:block;color:var(--mint-deep);font-size:26px;font-weight:900;} .kpi span{color:var(--ink-soft);font-size:13px;}
  .big-btn{width:100%;background:var(--mint);color:var(--ink);border:none;padding:15px;border-radius:14px;font-weight:800;font-size:15px;cursor:pointer;}
  .lbrow{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid rgba(11,27,46,.07);border-radius:14px;padding:12px 14px;margin-bottom:8px;}
  .lbrow .rk{font-weight:900;width:24px;} .lbrow .nm{flex:1;font-weight:700;} .lbrow .pts{font-family:"JetBrains Mono",monospace;font-weight:700;color:var(--mint-deep);}
  footer{text-align:center;color:var(--ink-soft);font-size:11px;padding:18px;}
  .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:24px;background:var(--ink);color:#fff;border-radius:14px;padding:13px 18px;max-width:90%;font-weight:600;z-index:90;}
</style>
</head>
<body>
<header>
  <div class="brand"><span class="ball"><img src="WIIIN_icon.svg" alt="Wiiin"></span><b>wiiin<span style="color:var(--mint)">.</span></b></div>
  <div id="auth"></div>
</header>
<main>
  <div class="lead">
    <h1>Roland-Garros — pronostique <span class="hl">maintenant</span>.</h1>
    <p>Choisis ton camp avant le coup d'envoi. Points figés au moment du pronostic.</p>
  </div>
  <div class="tabs">
    <div class="tab on" data-tab="matches" onclick="showTab('matches')">Matchs</div>
    <div class="tab" data-tab="board" onclick="showTab('board')">🏆 Classement</div>
    <div class="tab" id="godtab" data-tab="god" onclick="showTab('god')" style="display:none">👑 GOD</div>
  </div>
  <div id="view"></div>
</main>
<footer class="mono">🔞 18+ · preview interne · aucun argent réel</footer>
<div id="toast"></div>

<script type="module">
import { Clerk } from 'https://esm.sh/@clerk/clerk-js@5';
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
const SUPABASE_URL='https://jtohychyjmzyilucmncy.supabase.co';
const SUPABASE_KEY='sb_publishable_3NUafZam7zoQuHZKy9Ciyw_q-kcCrxe';
const CLERK_PK='pk_test_ZWFzeS1zYXdmbHktNTAuY2xlcmsuYWNjb3VudHMuZGV2JA';
const FN_URL=SUPABASE_URL+'/functions/v1/ingest';
const clerk=new Clerk(CLERK_PK); await clerk.load({afterSignOutUrl:location.href});
const supabase=createClient(SUPABASE_URL,SUPABASE_KEY,{auth:{persistSession:false},accessToken:async()=>(clerk.session?await clerk.session.getToken():null)});
let isAdmin=false, tab='matches';
const $=(id)=>document.getElementById(id);
const toast=(m)=>{const t=$('toast');t.innerHTML=`<div class="toast">${m}</div>`;setTimeout(()=>t.innerHTML='',3500);};
const fmtScore=(s)=>s?[s.period_1,s.period_2,s.period_3,s.period_4,s.period_5].filter(v=>v!=null).join(' '):'';
const badge=(st)=>st==='live'?`<span class="badge" style="background:var(--hot)">EN DIRECT</span>`:st==='finished'?`<span class="badge" style="background:var(--ink-soft)">TERMINÉ</span>`:`<span class="badge" style="background:var(--plum)">À VENIR</span>`;
async function refreshAuth(){const u=clerk.user;if(u){const email=u.primaryEmailAddress?.emailAddress?.toLowerCase();const {data}=await supabase.from('admins').select('email').eq('email',email).maybeSingle();isAdmin=!!data;$('godtab').style.display=isAdmin?'block':'none';$('auth').innerHTML=`<button class="pill pill-ghost" id="out">Déconnexion</button>`;$('out').onclick=()=>clerk.signOut();}else{isAdmin=false;$('godtab').style.display='none';$('auth').innerHTML=`<button class="pill pill-mint" id="in">Connexion</button>`;$('in').onclick=()=>clerk.openSignIn({});}}
clerk.addListener(()=>{refreshAuth();if(tab!=='matches')render();});
window.showTab=(t)=>{tab=t;document.querySelectorAll('.tab').forEach(e=>e.classList.toggle('on',e.dataset.tab===t));render();};
async function render(){const v=$('view');if(tab==='matches')return renderMatches(v);if(tab==='board')return renderBoard(v);if(tab==='god')return renderGod(v);}
async function renderMatches(v){v.innerHTML=`<div class="center">Chargement…</div>`;const {data:ms}=await supabase.from('matches').select('*').order('start_time');if(!ms?.length){v.innerHTML=`<div class="center">Aucun match pour l'instant.</div>`;return;}let mine={};if(clerk.user){const {data:ps}=await supabase.from('predictions').select('*');(ps||[]).forEach(p=>mine[p.source_match_id]=p);}v.innerHTML=ms.map(m=>{const p=mine[m.source_match_id];return `<div class="mcard"><div class="row" style="margin-bottom:6px;"><div>${m.sport==='tennis'?'🎾':'⚽️'} ${badge(m.status)}</div><span class="muted mono" style="font-size:12px;">${new Date(m.start_time).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span></div>${side(m,'home',p)}${side(m,'away',p)}${p?`<div class="muted" style="margin-top:8px;color:var(--mint-deep);font-weight:600;">✅ Ton pronostic : ${p.pick==='home'?m.home_name:m.away_name} · ${p.locked_points} pts${p.settled?` → ${p.awarded_points} gagnés`:''}</div>`:''}</div>`;}).join('');}
function side(m,k,p){const name=m[k+'_name'],pts=m[k+'_points'],sc=fmtScore(m[k+'_score']);const picked=p&&p.pick===k;const can=clerk.user&&m.status==='upcoming'&&!p&&pts!=null;return `<div class="side ${can?'can':''} ${picked?'pk':''}" ${can?`onclick="pick('${m.source_match_id}','${k}',${pts})"`:''}><span class="nm">${name}${picked?' ✓':''}</span><span class="row" style="gap:14px;">${sc?`<span class="sc">${sc}</span>`:''}<span class="pts">${pts!=null?pts+' pts':'—'}</span></span></div>`;}
window.pick=async(id,k,pts)=>{if(!clerk.user)return clerk.openSignIn({});const {error}=await supabase.from('predictions').insert({user_id:clerk.user.id,source_match_id:id,pick:k,locked_points:pts});if(error)return toast('⚠️ '+error.message);toast('✅ Pronostic enregistré !');render();};
async function renderBoard(v){v.innerHTML=`<div class="center">Chargement…</div>`;const {data}=await supabase.from('user_scores').select('*').order('total_points',{ascending:false}).limit(100);if(!data?.length){v.innerHTML=`<div class="center">Pas encore de scores.</div>`;return;}v.innerHTML=data.map((r,i)=>`<div class="lbrow"><span class="rk">${i+1}</span><span class="nm">${clerk.user&&r.user_id===clerk.user.id?'Toi':'Joueur '+r.user_id.slice(-4)}</span><span class="pts">${r.total_points} pts</span></div>`).join('');}
async function renderGod(v){if(!isAdmin){v.innerHTML=`<div class="center">⛔ Réservé.</div>`;return;}v.innerHTML=`<div class="kpis"><div class="kpi"><b id="k1">–</b><span>Matchs</span></div><div class="kpi"><b id="k2">–</b><span>En direct</span></div><div class="kpi"><b id="k3">–</b><span>Joueurs</span></div></div><button class="big-btn" id="rf">⟳ Forcer un rafraîchissement</button><div class="muted" id="gout" style="margin-top:12px;"></div>`;const c=async(q)=>(await q).count??0;$('k1').textContent=await c(supabase.from('matches').select('*',{count:'exact',head:true}));$('k2').textContent=await c(supabase.from('matches').select('*',{count:'exact',head:true}).eq('status','live'));$('k3').textContent=await c(supabase.from('user_scores').select('*',{count:'exact',head:true}));$('rf').onclick=async()=>{$('gout').textContent='…';try{const token=await clerk.session.getToken();const r=await fetch(FN_URL,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:'{}'});const j=await r.json();$('gout').textContent=j.ok?`✅ ${j.count} matchs, ${j.settled} réglés.`:`⚠️ ${j.error||'erreur'}`;}catch(e){$('gout').textContent='⚠️ '+e.message;}};}
await refreshAuth(); render(); setInterval(()=>{if(tab==='matches'||tab==='board')render();},20000);
</script>
</body>
</html>
